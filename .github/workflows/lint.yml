on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - "**/*.rs"
      # Markdown files feed the Phase-F `<!-- mehen-docs -->` section
      # so the self-check publishes documentation metrics on doc-only PRs.
      - "**/*.md"
      - "**/*.markdown"
      - "**/*.mdown"
      - "**/*.mkd"
      - "**/*.mkdn"
      - "**/*.mdx"
      - ".github/workflows/lint.yml"
      - "action.yml"
      - Cargo.lock
      - "scripts/**/*.mjs"

permissions:
  contents: read
  pull-requests: write
  issues: write

name: Code Quality Checks

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-Dwarnings"
  CARGO_TERM_COLOR: always
  CLICOLOR: 1

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
      - name: Set up Rust toolchain
        run: rustup show

      - name: Check GitHub Action script
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: node --test scripts/github-action.test.mjs

      - run: cargo clippy --workspace --all-targets --all-features --locked

      - run: cargo fmt --all --check

      - name: Spell Check Repo
        uses: crate-ci/typos@v1

      - name: Cargo Machete
        uses: bnjbvr/cargo-machete@7959c845782fed02ee69303126d4a12d64f1db18 # v0.9.1

      - name: Publish mehen metrics
        uses: ./
        with:
          install-method: cargo
          # `crates` carries the per-language analyzer + engine
          # source after the 1.0 workspace split; `xtask` is the
          # build-helper crate. `docs`, `mehen-book/src`, and the
          # top-level Markdown files feed the Phase-F
          # `<!-- mehen-docs -->` documentation-metrics section. Any
          # path that matches one of mehen's registered Markdown
          # extensions (md/markdown/mdown/mkd/mkdn/mdx) is routed
          # through the documentation pipeline. Keep this list in
          # sync with every root Markdown file so doc-only PRs do
          # not silently skip the self-check.
          paths: |
            crates
            xtask
            docs
            mehen-book/src
            README.md
            AGENTS.md
            CLAUDE.md
            CHANGELOG.md
          # `xtask/templates/grammar.rs` is an askama template — it
          # has the `.rs` extension so language detection routes it
          # through the Rust analyzer, but it carries `{{ c_name }}`
          # and other template directives that don't parse as Rust.
          # The analyzer reports `rust.syntax_error` diagnostics that
          # flip `mehen diff`'s exit code to 1 (per plan §9.3), even
          # when the JSON report is otherwise complete. Skip it.
          exclude: |
            xtask/templates/**
