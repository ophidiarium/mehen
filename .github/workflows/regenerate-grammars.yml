name: Regenerate Tree-sitter Grammars

on:
  pull_request_target:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  RUSTUP_MAX_RETRIES: 10

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      contains(github.event.pull_request.head.ref, 'tree-sitter')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync inline tree-sitter pins to xtask and per-crate Cargo.toml
        run: |
          # Most grammar pins live in root [workspace.dependencies] and
          # are referenced as `{ workspace = true }` from xtask and the
          # owning per-language crate, so dependabot's root-Cargo.toml
          # bump is enough. The exception is `tree-sitter-c`, which is
          # inline-pinned in both `xtask/Cargo.toml` and
          # `crates/mehen-c/Cargo.toml` to keep the workspace-pin set
          # tight (only `mehen-c` consumes it). When dependabot bumps
          # the inline pin in either of those, mirror it into the other
          # so the kind-enum generator and analyzer link the same
          # grammar version.
          for pkg in tree-sitter-c; do
            line=$(grep -h "^${pkg} = " xtask/Cargo.toml crates/mehen-c/Cargo.toml | head -n 1)
            if [ -n "$line" ]; then
              sed -i "s|^${pkg} = .*|${line}|" xtask/Cargo.toml crates/mehen-c/Cargo.toml
            fi
          done
          echo "Inline pins after sync:"
          grep -H "^tree-sitter-c" xtask/Cargo.toml crates/mehen-c/Cargo.toml

      - name: Set up Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ hashFiles('**/Cargo.lock') }}"
          cache-on-failure: true

      - name: Regenerate grammars
        run: cargo xtask tree-sitter generate --all

      - name: Install cargo-insta
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-insta

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        env:
          NEXTEST_PROFILE: ci
        # `--workspace` is required because `default-members` in the
        # root `Cargo.toml` restricts root-level cargo commands to the
        # `mehen` package; without it, every per-language crate's
        # tests would be skipped and a regenerated grammar that
        # breaks one of them would land silently.
        run: cargo insta test --workspace --all-features --check --unreferenced reject --test-runner nextest --no-test-runner-fallback --disable-nextest-doctest

      - name: Commit and push regenerated grammars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: regenerate tree-sitter grammars"
            git push
          fi

      - name: Add tree-sitter label
        run: |
          gh label create tree-sitter --description "Tree-sitter grammar updates" --color "0075ca" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "tree-sitter"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
