version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    groups:
      tree-sitter:
        patterns:
          - "tree-sitter*"
      oxc:
        patterns:
          - "oxc_*"
      mago:
        patterns:
          - "mago-*"
