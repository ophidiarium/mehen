# Codecov configuration.
# See https://docs.codecov.com/docs/codecov-yaml for the schema.

# The per-language tree-sitter kind enums at `crates/mehen-*/src/grammar.rs`
# are generated by `cargo xtask tree-sitter generate <language>` from the
# pinned grammar's `node-kind` table. They contain no business logic —
# just a flat `enum` of every tree-sitter node kind plus `From<u16>` /
# `From<&str>` glue — so their coverage is dominated by `unreachable!()`-
# style default branches that are semantically unreachable when the
# grammar is well-formed. Excluding them keeps the coverage report
# focused on hand-written analysis code.
ignore:
  - "crates/*/src/grammar.rs"
