# Codecov configuration.
# See https://docs.codecov.com/docs/codecov-yaml for the schema.

# The per-language AST enums under `src/languages/language_*.rs` are
# generated by the `enums/` build tool from the tree-sitter grammar
# node-types; see `./recreate-grammars.sh` and the generator at
# `enums/src/`. They contain no business logic — just a flat `enum` of
# every tree-sitter node kind plus `From<u16>` / `From<&str>` glue — so
# their coverage is dominated by `unreachable!()`-style default branches
# that are semantically unreachable when the grammar is well-formed.
# Excluding them keeps the coverage report focused on hand-written
# analysis code.
ignore:
  - "src/languages/language_*.rs"
