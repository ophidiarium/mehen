# https://github.com/crate-ci/typos
# cargo install typos-cli
# typos
[files]
# https://github.com/crate-ci/typos/issues/868
extend-exclude = [
    "enums/data/",
    "tree-sitter-*/examples/",
    "**/CHANGELOG.md",
    "**/snapshots/**/*",
    # Prose-metric dictionaries intentionally contain non-words, cliches,
    # hedges, and weasel phrases for the analyzer to flag. Excluding them
    # from typo checking keeps the analyzer lists authoritative.
    "crates/mehen-markdown/src/data/nonwords.txt",
    "crates/mehen-markdown/src/data/cliches.txt",
    "crates/mehen-markdown/src/data/hedges.txt",
    "crates/mehen-markdown/src/data/weasels.txt",
    "crates/mehen-markdown/src/data/wordy_phrases.txt",
    "crates/mehen-markdown/src/data/inclusive_flags.txt",
    "crates/mehen-markdown/src/data/ja_weak_phrases.txt",
    "crates/mehen-markdown/src/data/ja_redundant.txt",
]

[default.extend-identifiers]
# Common Rust abbreviation for "type" (reserved keyword)
typ = "typ"
typs = "typs"
typs1 = "typs1"
typs2 = "typs2"
# Short for "inherited" in lang_detect.rs block-language inheritance logic.
inh = "inh"

[default.extend-words]
# Intentional misspellings in negative-path tests for the `--fail-on`
# value parser (`src/diff.rs` rejects unknown names via clap).
borken = "borken"
hihg = "hihg"
# Intentional name of a removed language parser
Ccomment = "Ccomment"
"Winn" = "Winn"
"ALOC" = "ALOC"
"ine" = "ine"
"Hge" = "Hge"
"ccontains" = "ccontains"
"Seh" = "Seh"
# Readability formula by Caylor, Sticht, Fox & Ford (1973) — proper noun
"FORCAST" = "FORCAST"
"forcast" = "forcast"
# Proper noun: Jean Ure (lexical density, 1971)
"Ure" = "Ure"
# Proper noun: Yukio Ono (Japanese readability, Tateishi/Ono/Yamada 1988)
"Ono" = "Ono"
# Acronym for Wording Quality Score (§33.11, §36.7)
"WQS" = "WQS"
# Proper noun: Automattic (harper Rust grammar checker vendor)
"Automattic" = "Automattic"
# Suffix-pattern fragment cited in §33.6 nominalizations (-ment)
"ment" = "ment"
"Dereferencable" = "Dereferencable"
"ue" = "ue"
"mis" = "mis"
"Hashi" = "Hashi"
"requireds" = "requireds"
