# https://github.com/crate-ci/typos
# cargo install typos-cli
# typos
[files]
# https://github.com/crate-ci/typos/issues/868
extend-exclude = [
    "enums/data/",
    "tree-sitter-*/examples/",
    "**/CHANGELOG.md",
    "**/snapshots/**/*",
]

[default.extend-identifiers]
# Common Rust abbreviation for "type" (reserved keyword)
typ = "typ"
typs = "typs"
typs1 = "typs1"
typs2 = "typs2"

[default.extend-words]
# Intentional name of a removed language parser
Ccomment = "Ccomment"
"Winn" = "Winn"
"ALOC" = "ALOC"
"ine" = "ine"
"Hge" = "Hge"
"ccontains" = "ccontains"
"Seh" = "Seh"
# Readability formula by Caylor, Sticht, Fox & Ford (1973) — proper noun
"FORCAST" = "FORCAST"
"forcast" = "forcast"
# Proper noun: Jean Ure (lexical density, 1971)
"Ure" = "Ure"
# Proper noun: Yukio Ono (Japanese readability, Tateishi/Ono/Yamada 1988)
"Ono" = "Ono"
# Acronym for Wording Quality Score (§33.11, §36.7)
"WQS" = "WQS"
# Proper noun: Automattic (harper Rust grammar checker vendor)
"Automattic" = "Automattic"
# Suffix-pattern fragment cited in §33.6 nominalizations (-ment)
"ment" = "ment"
