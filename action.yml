name: "mehen"
description: "Publish source code metric trends for pull requests"
author: "Ophidiarium"
branding:
  icon: "activity"
  color: "green"

inputs:
  version:
    description: "Version of the mehen npm package to run. Empty means latest."
    required: false
    default: ""
  install-method:
    description: "How to provide the mehen CLI: npm, cargo, or path."
    required: false
    default: "npm"
  mehen-path:
    description: "Path to a mehen executable when install-method is path."
    required: false
    default: "mehen"
  node-version:
    description: "Node.js version used by the action runner."
    required: false
    default: "22"
  paths:
    description: "Repository-relative files or directories to compare. Newline, comma, or space separated."
    required: false
    default: "."
  include:
    description: "Glob patterns to include. Newline, comma, or space separated."
    required: false
    default: ""
  exclude:
    description: "Glob patterns to exclude. Newline, comma, or space separated."
    required: false
    default: ""
  metrics:
    description: "Comma-separated metrics passed to mehen diff."
    required: false
    default: ""
  from:
    description: "Base git revision. Defaults to the PR base branch or main."
    required: false
    default: ""
  to:
    description: "Head git revision. Defaults to the PR head SHA or HEAD."
    required: false
    default: ""
  show-unchanged:
    description: "Include files where all selected metrics are unchanged."
    required: false
    default: "false"
  comment:
    description: "Create or update a pull request comment."
    required: false
    default: "true"
  github-token:
    description: "GitHub token used to update pull request comments."
    required: false
    default: ""
  thresholds:
    description: "Adverse per-file delta limits, for example: cyclomatic=5,cognitive=3,loc.lloc=100."
    required: false
    default: ""
  fail-on-threshold:
    description: "Fail the action when any configured threshold is exceeded."
    required: false
    default: "true"
  comment-title:
    description: "Markdown heading used for the sticky pull request comment."
    required: false
    default: "## [Mehen](https://github.com/ophidiarium/mehen) Summary"

outputs:
  violations:
    description: "Number of threshold violations."
    value: ${{ steps.run.outputs.violations }}
  report_json:
    description: "Path to the JSON diff report produced by mehen."
    value: ${{ steps.run.outputs.report_json }}
  report_markdown:
    description: "Path to the rendered Markdown report."
    value: ${{ steps.run.outputs.report_markdown }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Publish mehen metrics
      id: run
      shell: bash
      run: node "$GITHUB_ACTION_PATH/scripts/github-action.mjs"
      env:
        GHA_MEHEN_VERSION: ${{ inputs.version }}
        GHA_MEHEN_INSTALL_METHOD: ${{ inputs.install-method }}
        GHA_MEHEN_PATH: ${{ inputs.mehen-path }}
        GHA_MEHEN_PATHS: ${{ inputs.paths }}
        GHA_MEHEN_INCLUDE: ${{ inputs.include }}
        GHA_MEHEN_EXCLUDE: ${{ inputs.exclude }}
        GHA_MEHEN_METRICS: ${{ inputs.metrics }}
        GHA_MEHEN_FROM: ${{ inputs.from }}
        GHA_MEHEN_TO: ${{ inputs.to }}
        GHA_MEHEN_SHOW_UNCHANGED: ${{ inputs.show-unchanged }}
        GHA_MEHEN_COMMENT: ${{ inputs.comment }}
        GHA_MEHEN_GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        GHA_MEHEN_THRESHOLDS: ${{ inputs.thresholds }}
        GHA_MEHEN_FAIL_ON_THRESHOLD: ${{ inputs.fail-on-threshold }}
        GHA_MEHEN_COMMENT_TITLE: ${{ inputs.comment-title }}
